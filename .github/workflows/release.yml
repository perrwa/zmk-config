name: Release ZMK firmware
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release (e.g., v1.0.0)"
        required: true
        type: string

jobs:
  build:
    permissions:
      contents: read
    uses: zmkfirmware/zmk/.github/workflows/build-user-config.yml@v0.3
    with:
      fallback_binary: hex

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Determine release tag
        id: tag
        run: |
          if [ -n "$TAG" ]; then
            echo "name=$TAG" >> "$GITHUB_OUTPUT"
          else
            echo "name=build-$(date +%y%m%d)-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi
        env:
          TAG: ${{ inputs.tag }}

      - name: Download firmware artifact
        uses: actions/download-artifact@v4
        with:
          name: firmware
          path: ./release

      - name: Create GitHub Release (draft prerelease with notes)
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          files: ./release/*
          draft: true
          prerelease: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
