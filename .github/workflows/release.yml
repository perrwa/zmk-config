name: Release ZMK firmware
on:
  push:
    branches: [main]
    paths-ignore:
      - "keymap-drawer/**"
      - "keymap_drawer.config.yaml"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release (e.g., v25.08.1)"
        required: true
        type: string

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build:
    permissions:
      contents: read
    uses: zmkfirmware/zmk/.github/workflows/build-user-config.yml@main
    with:
      fallback_binary: hex

  release:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout (for tag listing)
        uses: actions/checkout@v4
        with:
          fetch-tags: true
          fetch-depth: 0

      - name: Determine release tag
        id: tag
        # Tag convention: vYY.MM.N (e.g., v25.08.1, v25.08.2)
        run: |
          if [ -n "$TAG" ]; then
            echo "name=$TAG" >> "$GITHUB_OUTPUT"
          else
            PREFIX="v$(date +%y.%m)"
            LAST=$(git tag -l "${PREFIX}.*" --sort=-v:refname | head -n1)
            if [ -n "$LAST" ]; then
              N=$(( ${LAST##*.} + 1 ))
            else
              N=1
            fi
            echo "name=${PREFIX}.${N}" >> "$GITHUB_OUTPUT"
          fi
        env:
          TAG: ${{ github.event.inputs.tag || '' }}

      - name: Download firmware artifact
        uses: actions/download-artifact@v4
        with:
          name: firmware
          path: ./release

      - name: Create GitHub Release (draft prerelease with notes)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          files: ./release/*
          draft: true
          prerelease: true
          generate_release_notes: true
