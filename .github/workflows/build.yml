name: Build ZMK firmware
on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "keymap-drawer/**"
      - "keymap_drawer.config.yaml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    permissions:
      contents: read
    uses: zmkfirmware/zmk/.github/workflows/build-user-config.yml@v0.3
    with:
      fallback_binary: hex
