name: Build ZMK firmware
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-changes:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      firmware: ${{ steps.filter.outputs.firmware }}
    steps:
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            firmware:
              - 'config/**'
              - 'boards/**'
              - 'build.yaml'
              - 'zephyr/**'
              - '.github/workflows/build.yml'

  build:
    needs: check-changes
    if: always() && (needs.check-changes.outputs.firmware == 'true' || needs.check-changes.result == 'skipped')
    permissions:
      contents: read
    uses: zmkfirmware/zmk/.github/workflows/build-user-config.yml@v0.3
    with:
      fallback_binary: hex

  # Gate job that always runs — use this as the required status check
  # instead of internal reusable-workflow jobs that may be skipped.
  build-result:
    if: always()
    needs: build
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - run: |
          if [ "${{ needs.build.result }}" = "failure" ]; then
            echo "Build failed"
            exit 1
          fi
          echo "Build OK (result: ${{ needs.build.result }})"
