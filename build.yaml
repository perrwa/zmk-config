---
include:
  - board: nice_nano//zmk
    shield: settings_reset

  - board: mdbt50q_cx_40
    shield: corne_dongle
  - board: mdbt50q_cx_40
    shield: settings_reset

  # Diagnostic: test if RX also overflows RAM on Zephyr 4.1
  - board: mdbt50q_rx
    shield: corne_dongle
  - board: mdbt50q_rx
    shield: settings_reset

  # Dongle setup: both halves are peripherals (dongle is central)
  - board: nice_nano//zmk
    shield: corne_left
    cmake-args: -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
    artifact-name: corne_dongle_left-zmk
  - board: nice_nano//zmk
    shield: corne_right
    cmake-args: -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
    artifact-name: corne_dongle_right-zmk
