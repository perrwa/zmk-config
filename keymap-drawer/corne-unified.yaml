layout: {zmk_keyboard: corne}
layers:
  perrwa/corne:
  - {t: '$$material:keyboard_tab$$', s: '`'}
  - {t: Q, s: '1'}
  - {t: W, s: '2', h: '$$material:no_sound$$'}
  - {t: E, s: '3', h: '$$material:volume_down$$'}
  - {t: R, s: '4', h: '$$material:volume_up$$'}
  - {t: T, s: '5', right: '$$material:power_off$$'}
  - {t: Y, s: '6', h: '$$material:keyboard_double_arrow_left$$'}
  - {t: U, s: '7', h: '$$material:keyboard_double_arrow_down$$', right: '7'}
  - {t: I, s: '8', h: '$$material:keyboard_double_arrow_up$$', right: '8'}
  - {t: O, s: '9', h: '$$material:keyboard_double_arrow_right$$', right: '9'}
  - {t: P, s: '0', right: +}
  - {t: '$$material:keyboard_backspace$$', s: \, h: '$$material:delete$$', right: '*'}
  - {t: '$$material:logout$$', s: '$$material:calculate$$', left: '$$material:more_down$$'}
  - A
  - {t: S, h: '$$material:skip_previous$$'}
  - {t: D, s: '$$material:switch_left$$', h: '$$material:play_pause$$'}
  - {t: F, s: '$$material:switch_right$$', h: '$$material:skip_next$$'}
  - {t: G, s: '['}
  - {t: H, s: ']', h: '$$material:arrow_left$$'}
  - {t: J, s: '-', h: '$$material:arrow_drop_down$$', right: '4'}
  - {t: K, s: '=', h: '$$material:arrow_drop_up$$', right: '5'}
  - {t: L, h: '$$material:arrow_right$$', right: '6'}
  - {t: ;, right: '-'}
  - {t: '''', h: ▽, right: /}
  - {t: '$$material:shift$$', s: ▽, h: ▽}
  - {t: Z, s: F1}
  - {t: X, s: F2}
  - {t: C, s: F3}
  - {t: V, s: F4}
  - {t: B, s: F5}
  - {t: N, s: F6}
  - {t: M, s: F7, right: '1'}
  - {t: ',', s: F8, right: '2'}
  - {t: ., s: F9, right: '3'}
  - {t: /, s: F10}
  - {t: '$$material:keyboard_return$$', s: ▽, left: '$$material:shift$$'}
  - {t: (, s: ▽, h: ▽, left: '$$material:keyboard_option_key$$', right: ▽}
  - {t: '$$material:space_bar$$', h: '$$material:calculate$$', left: '$$material:more_up$$'}
  - {t: '$$material:keyboard_return$$', s: ▽, h: ▽, left: '$$material:keyboard_command_key$$',
    right: '$$material:pin$$'}
  - {t: '$$material:keyboard_return$$', s: ▽, h: ▽, left: '$$material:keyboard_command_key$$',
    right: ▽}
  - {t: '$$material:space_bar$$', s: ▽, left: '$$material:more_up$$', right: '0'}
  - {t: ), s: ▽, h: ▽, left: '$$material:keyboard_control_key$$', right: .}
